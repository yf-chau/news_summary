name: Weekly News Digest

on:
  schedule:
    - cron: "0 1 * * 6"   # Saturday 01:00 UTC = Saturday 09:00 HKT
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  run-digest:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Restore cached articles
        uses: actions/cache/restore@v4
        with:
          path: data/articles.jsonl
          key: articles-${{ github.run_id }}
          restore-keys: articles-

      - name: Fetch today's articles
        run: uv run --no-dev python fetch_articles.py

      - name: Save cached articles
        uses: actions/cache/save@v4
        with:
          path: data/articles.jsonl
          key: articles-${{ github.run_id }}

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUBSTACK_EMAIL: ${{ secrets.SUBSTACK_EMAIL }}
          SUBSTACK_PASSWORD: ${{ secrets.SUBSTACK_PASSWORD }}
          SUBSTACK_URL: ${{ secrets.SUBSTACK_URL }}
          SUBSTACK_SID: ${{ secrets.SUBSTACK_SID }}
        run: caffeinate -i uv run --no-dev python main.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "## :x: Weekly News Digest failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The pipeline failed. If the exit code was **2**, the SUBSTACK_SID cookie has likely expired." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Action required:** Rotate the \`SUBSTACK_SID\` secret with a fresh cookie from a browser session." >> "$GITHUB_STEP_SUMMARY"
