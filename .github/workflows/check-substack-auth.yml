name: Check Substack Auth

on:
  schedule:
    - cron: "48 10 * * 4"   # Thursday 10:48 UTC = Thursday 18:48 HKT (36h before publish)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  check-auth:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Verify Substack auth
        env:
          SUBSTACK_EMAIL: ${{ secrets.SUBSTACK_EMAIL }}
          SUBSTACK_PASSWORD: ${{ secrets.SUBSTACK_PASSWORD }}
          SUBSTACK_URL: ${{ secrets.SUBSTACK_URL }}
          SUBSTACK_SID: ${{ secrets.SUBSTACK_SID }}
        run: uv run --no-dev python -c "from substack_api import verify_auth; verify_auth()"

      - name: Notify on failure
        if: failure()
        run: |
          echo "## :warning: Substack auth check failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The SUBSTACK_SID cookie has likely expired. The Saturday digest will fail unless the cookie is rotated." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Action required:** Rotate the \`SUBSTACK_SID\` secret with a fresh cookie from a browser session before Saturday." >> "$GITHUB_STEP_SUMMARY"
