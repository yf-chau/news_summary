name: Check Substack Auth

on:
  schedule:
    - cron: "48 10 * * 4"   # Thursday 10:48 UTC = Thursday 18:48 HKT (36h before publish)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  check-auth:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Verify Substack auth
        run: |
          uv run --no-dev python -c "
          import os
          from substack_api import verify_auth
          for label, url in [('Chinese', os.environ.get('SUBSTACK_URL')), ('English', os.environ.get('SUBSTACK_EN_URL'))]:
              if url:
                  verify_auth(publication_url=url)
                  print(f'{label} Substack auth OK')
          "

      - name: Notify on failure
        if: failure()
        run: |
          echo "## :warning: Substack auth check failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The SUBSTACK_SID cookie has likely expired. The Saturday digest will fail unless the cookie is rotated." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Action required:** Update the \`SUBSTACK_SID\` in the \`.env\` file on the self-hosted runner with a fresh cookie from a browser session before Saturday." >> "$GITHUB_STEP_SUMMARY"
